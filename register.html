 
   <!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | VETA COMPANY LTD</title>
<meta name="description" content="Create your secure VETA COMPANY LTD account to access the client portal.">

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          primary: "#adc7ff",
          background: "#131313",
          surface: "#131313",
          "surface-1": "#121212",
          "on-surface": "#e5e2e1",
          "on-surface-variant": "#a1a1aa",
          "outline-variant": "#414754"
        },
        maxWidth: {
          'container': '1320px'
        },
        fontFamily: {
          sans: ['Inter', 'sans-serif'],
          display: ['Space Grotesk', 'sans-serif']
        }
      }
    }
  }
</script>

<style>
  body {
    font-family: 'Inter', sans-serif;
  }
  .form-control {
    background: #111827 !important;
    border: 1px solid #414754 !important;
    color: #e5e2e1 !important;
    height: 50px;
  }
  .form-control:focus {
    background: #111827 !important;
    color: #e5e2e1 !important;
    border-color: #adc7ff !important;
    box-shadow: 0 0 0 1px #adc7ff !important;
  }
  .input-group-text {
    background: #111827 !important;
    border: 1px solid #414754 !important;
    color: #a1a1aa !important;
    cursor: pointer;
  }
</style>
</head>

<body class="bg-background text-on-surface min-h-screen flex flex-col">
  <!-- TopNavBar - matches rest of site -->
  <header class="w-full bg-surface/90 backdrop-blur-md border-b border-outline-variant">
    <div class="flex justify-between items-center w-full px-4 md:px-8 py-4 max-w-container mx-auto">
      <a href="index.html" class="text-xl font-bold text-primary tracking-tight font-display">VETA COMPANY LTD</a>
      <div class="flex items-center gap-6">
        <a class="text-sm text-on-surface-variant hover:text-primary transition-colors" href="index.html">Home</a>
        <a class="text-sm text-on-surface-variant hover:text-primary transition-colors" href="login.html">Login</a>
      </div>
    </div>
  </header>

  <!-- Register Form -->
  <main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-surface-1 border border-outline-variant rounded-2xl p-8 md:p-10 shadow-2xl">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-primary mb-2 font-display">Create Account</h1>
        <p class="text-on-surface-variant text-sm">Join VETA's secure client portal</p>
      </div>

      <form id="registerForm" class="space-y-6">
        <div>
          <label class="block text-sm text-on-surface-variant mb-2 uppercase tracking-wider font-semibold">Full Name</label>
          <input type="text" id="fullName" class="form-control w-full rounded-lg px-4" placeholder="John Doe" required>
        </div>

        <div>
          <label class="block text-sm text-on-surface-variant mb-2 uppercase tracking-wider font-semibold">Email Address</label>
          <input type="email" id="email" class="form-control w-full rounded-lg px-4" placeholder="you@company.com" required>
        </div>

        <div>
          <label class="block text-sm text-on-surface-variant mb-2 uppercase tracking-wider font-semibold">Password</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control rounded-l-lg" placeholder="Minimum 8 characters" required minlength="8">
            <span class="input-group-text rounded-r-lg px-4" onclick="togglePassword()">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </span>
          </div>
          <p class="text-xs text-on-surface-variant mt-2">Must contain 8+ characters, 1 uppercase, 1 number</p>
        </div>

        <div class="flex items-start gap-3">
          <input type="checkbox" id="terms" class="mt-1 bg-surface-1 border-outline-variant rounded text-primary focus:ring-primary" required>
          <label for="terms" class="text-sm text-on-surface-variant">
            I agree to VETA's <a href="terms.html" class="text-primary hover:text-white">Terms of Service</a> and <a href="privacy.html" class="text-primary hover:text-white">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="w-full bg-primary text-black font-bold py-3 rounded-lg hover:bg-opacity-90 active:scale-[0.98] transition-all">
          Create Account
        </button>

        <p id="registerStatus" class="text-sm text-center hidden"></p>
      </form>

      <div class="border-t border-outline-variant mt-8 pt-6">
        <p class="text-center text-sm text-on-surface-variant">
          Already have an account?
          <a href="login.html" class="text-primary hover:text-white font-semibold">Login</a>
        </p>
      </div>

      <div class="border-t border-outline-variant mt-6 pt-6">
        <p class="text-center text-xs text-on-surface-variant">
          © 2026 VETA COMPANY LTD. All communications encrypted.
        </p>
      </div>
    </div>
  </main>

<script>
function togglePassword(){
  let password = document.getElementById("password");
  let eyeIcon = document.getElementById("eyeIcon");

  if(password.type === "password"){
    password.type = "text";
    eyeIcon.classList.remove("fa-eye");
    eyeIcon.classList.add("fa-eye-slash");
  }else{
    password.type = "password";
    eyeIcon.classList.remove("fa-eye-slash");
    eyeIcon.classList.add("fa-eye");
  }
}

// Basic form handler - replace with real auth
document.getElementById('registerForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const status = document.getElementById('registerStatus');
  const password = document.getElementById('password').value;
  
  // Basic password validation
  const passwordRegex = /^(?=.*[A-Z])(?=.*\d).{8,}$/;
  if(!passwordRegex.test(password)) {
    status.textContent = 'Password must be 8+ characters with 1 uppercase and 1 number.';
    status.classList.remove('hidden', 'text-primary');
    status.classList.add('text-red-400');
    return;
  }
  
  status.textContent = 'Creating secure account...';
  status.classList.remove('hidden', 'text-red-400');
  status.classList.add('text-primary');
  
  // Simulate auth - replace with Firebase/Auth0
  setTimeout(() => {
    status.textContent = 'Registration successful. Check your email to verify.';
    status.classList.remove('text-red-400');
    status.classList.add('text-green-400');
    this.reset();
  }, 1500);
});
</script>

</body>
</html>
