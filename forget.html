<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>

<style>
  body { font-family: 'Inter', sans-serif; }
  .form-control {
    background: #111827 !important;

<body class="bg-background text-on-surface min-h-screen flex flex-col">
  <header class="w-full bg-surface/90 backdrop-blur-md border-b border-outline-variant">
    <div class="flex justify-between items-center w-full px-4 md:px-8 py-4 max-w-container mx-auto">
      <a href="index.html" class="text-xl font-bold text-primary tracking-tight font-display">VETA COMPANY LTD</a>
      <div class="flex items-center gap-6">
        <a class="text-sm text-on-surface-variant hover:text-primary transition-colors" href="index.html">Home</a>
        <a class="text-sm text-on-surface-variant hover:text-primary transition-colors" href="login.html">Login</a>
      </div>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-surface-1 border border-outline-variant rounded-2xl p-8 md:p-10 shadow-2xl">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-primary mb-3 font-display">Forgot Password</h1>
        <p class="text-on-surface-variant text-sm">
          Enter your email address and we'll send you a secure reset link.
        </p>
      </div>

      <form id="forgotForm" class="space-y-6">
        <div>
          <label class="block text-sm text-on-surface-variant mb-2 uppercase tracking-wider font-semibold">Email Address</label>
          <input type="email" id="email" class="form-control w-full rounded-lg px-4" placeholder="you@company.com" required autocomplete="email">
        </div>

        <button type="submit" id="resetBtn" class="w-full bg-primary text-black font-bold py-3 rounded-lg hover:bg-opacity-90 active:scale-[0.98] transition-all disabled:opacity-50">
          Send Reset Link
        </button>

        <p id="forgotStatus" class="text-sm text-center hidden"></p>
      </form>

      <div class="border-t border-outline-variant mt-8 pt-6">
        <p class="text-center text-sm text-on-surface-variant">
          Remember your password?
          <a href="login.html" class="text-primary hover:text-white font-semibold">Back to Login</a>
        </p>
      </div>

      <div class="border-t border-outline-variant mt-6 pt-6">
        <p class="text-center text-xs text-on-surface-variant">
          © 2026 VETA COMPANY LTD. Password resets expire after 1 hour.
        </p>
      </div>
    </div>
  </main>

<!-- Firebase SDK - This is the real starter code -->
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // TODO: Replace with YOUR web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyC_YOUR_API_KEY",
    authDomain: "your-project.firebaseapp.com",
    projectId: "your-project-id",
    storageBucket: "your-project.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abc123def456"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Handle password reset
  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const status = document.getElementById('forgotStatus');
    const resetBtn = document.getElementById('resetBtn');
    const email = document.getElementById('email').value;
    
    resetBtn.disabled = true;
    status.textContent = 'Sending secure reset link...';
    status.classList.remove('hidden', 'text-red-400', 'text-green-400');
    status.classList.add('text-primary');

    try {
      await sendPasswordResetEmail(auth, email);
      status.textContent = 'Reset link sent! Check your inbox and spam folder.';
      status.classList.remove('text-primary', 'text-red-400');
      status.classList.add('text-green-400');
      e.target.reset();
      setTimeout(() => {
        resetBtn.disabled = false;
      }, 3000);
    } catch (error) {
      let message = 'Error sending reset email. Try again.';
      if (error.code === 'auth/too-many-requests') {
        message = 'Too many requests. Try again later.';
      } else if (error.code === 'auth/user-not-found') {
        // Don't reveal if user exists - security best practice
        status.textContent = 'Reset link sent! Check your inbox and spam folder.';
        status.classList.remove('text-primary', 'text-red-400');
        status.classList.add('text-green-400');
        resetBtn.disabled = false;
        return;
      }
      status.textContent = message;
      status.classList.remove('text-primary', 'text-green-400');
      status.classList.add('text-red-400');
      resetBtn.disabled = false;
    }
  });
</script>
<!-- End Firebase SDK -->

</body>
</html>
