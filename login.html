<body class="bg-background text-on-surface min-h-screen flex flex-col">
  <header class="w-full bg-surface/90 backdrop-blur-md border-b border-outline-variant">
    <div class="flex justify-between items-center w-full px-4 md:px-8 py-4 max-w-container mx-auto">
      <a href="index.html" class="text-xl font-bold text-primary tracking-tight font-display">VETA COMPANY LTD</a>
      <div class="flex items-center gap-6">
        <a class="text-sm text-on-surface-variant hover:text-primary transition-colors" href="index.html">Home</a>
        <a class="text-sm text-on-surface-variant hover:text-primary transition-colors" href="contact.html">Contact</a>
      </div>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-surface-1 border border-outline-variant rounded-2xl p-8 md:p-10 shadow-2xl">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-primary mb-2 font-display">VETA</h1>
        <p class="text-on-surface-variant text-sm">Secure Company Portal</p>
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm text-on-surface-variant mb-2 uppercase tracking-wider font-semibold">Email Address</label>
          <input type="email" id="email" class="form-control w-full rounded-lg px-4" placeholder="you@company.com" required autocomplete="email">
        </div>

        <div>
          <label class="block text-sm text-on-surface-variant mb-2 uppercase tracking-wider font-semibold">Password</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control rounded-l-lg" placeholder="Enter your password" required autocomplete="current-password">
            <span class="input-group-text rounded-r-lg px-4" onclick="togglePassword()">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </span>
          </div>
        </div>

        <button type="submit" id="loginBtn" class="w-full bg-primary text-black font-bold py-3 rounded-lg hover:bg-opacity-90 active:scale-[0.98] transition-all disabled:opacity-50">
          Sign In
        </button>

        <div class="flex justify-between text-sm">
          <a href="forgot.html" class="text-primary hover:text-white transition-colors">Forgot password?</a>
          <a href="register.html" class="text-primary hover:text-white transition-colors">Create account</a>
        </div>

        <p id="loginStatus" class="text-sm text-center hidden"></p>
      </form>

      <div class="border-t border-outline-variant mt-8 pt-6">
        <p class="text-center text-xs text-on-surface-variant">
          © 2026 VETA COMPANY LTD. All communications encrypted.
        </p>
      </div>
    </div>
  </main>

<!-- Firebase SDK - This is the real starter code -->
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // TODO: Replace with YOUR web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyC_YOUR_API_KEY",
    authDomain: "your-project.firebaseapp.com",
    projectId: "your-project-id",
    storageBucket: "your-project.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abc123def456"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Check if user already logged in
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // User is signed in, redirect to dashboard
      window.location.href = 'index.html';
    }
  });

  // Toggle password visibility
  window.togglePassword = function() {
    const password = document.getElementById("password");
    const eyeIcon = document.getElementById("eyeIcon");
    if(password.type === "password"){
      password.type = "text";
      eyeIcon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
      password.type = "password";
      eyeIcon.classList.replace("fa-eye-slash", "fa-eye");
    }
  }

  // Handle login
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const status = document.getElementById('loginStatus');
    const loginBtn = document.getElementById('loginBtn');
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    loginBtn.disabled = true;
    status.textContent = 'Authenticating...';
    status.classList.remove('hidden', 'text-red-400', 'text-green-400');
    status.classList.add('text-primary');

    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      status.textContent = 'Login successful. Redirecting...';
      status.classList.remove('text-primary', 'text-red-400');
      status.classList.add('text-green-400');
      setTimeout(() => window.location.href = 'index.html', 1000);
    } catch (error) {
      let message = 'Invalid email or password.';
      if (error.code === 'auth/too-many-requests') {
        message = 'Too many attempts. Try again later.';
      } else if (error.code === 'auth/user-disabled') {
        message = 'Account disabled. Contact support.';
      }
      status.textContent = message;
      status.classList.remove('text-primary', 'text-green-400');
      status.classList.add('text-red-400');
      loginBtn.disabled = false;
    }
  });
</script>
<!-- End Firebase SDK -->

</body>
</html>
