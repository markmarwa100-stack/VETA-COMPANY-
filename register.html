<!-- register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VETA COMPANY LTD | Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(to right,#050816,#0b1228);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
}

.register-container{
    width:450px;
    background:rgba(17,24,39,0.95);
    border-radius:20px;
    padding:40px;
    color:white;
    border:1px solid rgba(59,130,246,0.3);
}

h2{
    text-align:center;
    margin-bottom:30px;
    color:#3b82f6;
}

.form-control{
    background:#111827;
    border:1px solid #1e3a8a;
    color:white;
    height:50px;
}

.form-control:focus{
    background:#111827;
    color:white;
    box-shadow:none;
    border-color:#3b82f6;
}

.btn-register{
    background:#2563eb;
    border:none;
    height:50px;
    font-weight:bold;
    border-radius:10px;
}

.btn-register:hover{
    background:#1d4ed8;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#60a5fa;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="register-container">

    <h2>Create Account</h2>

    <form>

        <div class="mb-3">
            <label class="mb-2">Full Name</label>
            <input type="text" class="form-control" placeholder="Enter full name" required>
        </div>

        <div class="mb-3">
            <label class="mb-2">Email Address</label>
            <input type="email" class="form-control" placeholder="Enter email" required>
        </div>

        <div class="mb-4">
            <label class="mb-2">Password</label>
            <input type="password" class="form-control" placeholder="Create password" required>
        </div>

        <button type="submit" class="btn btn-register w-100 text-white">
            Create Account
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="login.html">Login</a>
    </div>

</div>

</body>
</html>
